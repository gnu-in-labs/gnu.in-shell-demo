<?xml version="1.0"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img" aria-labelledby="title desc">
  <title id="title">GNU6-shell onboarding card component template</title>
  <desc>Onboarding step component. Text and progress markers are editable.</desc>
  <rect id="onboarding-card" x="22" y="36" width="596" height="168" rx="22" fill="#FFFFFF" stroke="#E6E8EB" stroke-width="3"></rect>
  <g id="mark" transform="translate(58 60) scale(0.36)">
    <g id="onboard-cube-dialogue-symbol">
      <path id="onboard-dialogue-frame" d="M 194 52 H 256 Q 268 52 268 64 V 178 Q 268 190 256 190 H 184 L 160 214 V 190 H 146" fill="none" stroke="#FF6A00" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"></path>
      <g id="onboard-cube-terminal">
      <polygon id="onboard-cube-top" points="66,66 128,32 190,66 128,100" fill="#FF6A00"></polygon>
      <polygon id="onboard-cube-left" points="60,78 122,113 122,181 60,146" fill="#FF6A00"></polygon>
      <polygon id="onboard-terminal-face" points="134,113 196,78 196,146 134,181" fill="#111418"></polygon>
      <g id="onboard-prompt" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
        <polyline id="onboard-prompt-chevron" points="151,115 166,130 151,145"></polyline>
        <line id="onboard-prompt-cursor" x1="167" y1="153" x2="184" y2="153"></line>
      </g>
    </g>
    </g>
  </g>
  <g id="editable-text" font-family="Montreal, Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="230" y="92" font-size="31" font-weight="800" fill="#111418">Étape 2 / 4</text>
    <text x="230" y="132" font-size="28" fill="#667085">Configurer le contexte</text>
  </g>
  <g id="progress" transform="translate(230 166)" fill="#FFFFFF" stroke-width="3">
    <line x1="0" y1="0" x2="260" y2="0" stroke="#E6E8EB" stroke-width="3"></line>
    <circle cx="0" cy="0" r="10" stroke="#667085"></circle>
    <circle cx="86" cy="0" r="13" stroke="#FF6A00" stroke-width="5"></circle>
    <circle cx="172" cy="0" r="10" stroke="#667085"></circle>
    <circle cx="260" cy="0" r="10" stroke="#667085"></circle>
  </g>

</svg>