<?xml version="1.0"?>
<svg class="state-idle" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
<title id="title">Sys.ter layer 50-beret.svg</title>
<desc id="desc">GNU.IN OS Sys.ter mascot source rig v5. Physical z-order layers, real screen surface, dynamic shell glyphs, no foreground preservation hack.</desc>

<defs>
  <linearGradient id="orangeShell" x1="180" y1="300" x2="740" y2="860" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#FF7A12"></stop>
    <stop offset="0.45" stop-color="#FF6A00"></stop>
    <stop offset="1" stop-color="#D95400"></stop>
  </linearGradient>
