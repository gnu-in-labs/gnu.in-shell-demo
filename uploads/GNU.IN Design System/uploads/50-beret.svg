    <stop offset="1" stop-color="#3D5B34"></stop>
  </linearGradient>
  <linearGradient id="beretBand" x1="240" y1="360" x2="820" y2="500" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#161B1F"></stop>
    <stop offset="0.55" stop-color="#262C32"></stop>
    <stop offset="1" stop-color="#080B0E"></stop>
  </linearGradient>
  <linearGradient id="metalRod" x1="738" y1="215" x2="795" y2="640" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#FFFFFF"></stop>
    <stop offset="0.22" stop-color="#E5E8EA"></stop>
    <stop offset="0.5" stop-color="#FAFAF7"></stop>
    <stop offset="1" stop-color="#9DA4AB"></stop>
  </linearGradient>
  <linearGradient id="metalDark" x1="725" y1="530" x2="805" y2="670" gradientUnits="userSpaceOnUse">
