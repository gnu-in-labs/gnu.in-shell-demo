  </filter>
  <filter id="greenGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#8CE05A" flood-opacity="0.70"></feDropShadow>
  </filter>
  <filter id="redGlow" x="-60%" y="-60%" width="220%" height="220%">
    <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#E5484D" flood-opacity="0.72"></feDropShadow>
  </filter>
  <clipPath id="screenClip">
    <rect x="250" y="392" width="475" height="430" rx="76"></rect>
  </clipPath>
