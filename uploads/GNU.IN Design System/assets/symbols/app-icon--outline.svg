<?xml version="1.0"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" data-gnu-variant="outline" aria-labelledby="title desc">
  <title id="title">GNU6-shell app icon</title>
  <desc>Application icon tile. No shadow; transparent outside the rounded rectangle.</desc>
  <rect id="app-tile" x="18" y="18" width="220" height="220" rx="44" fill="none" stroke="#E6E8EB" stroke-width="3"></rect>
  <g id="mark" transform="translate(12 22) scale(0.80)">
    <g id="app-cube-dialogue-symbol">
