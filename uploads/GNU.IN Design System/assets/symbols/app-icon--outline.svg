      <polygon id="app-cube-left" points="60,78 122,113 122,181 60,146" fill="#FF6A00"></polygon>
      <polygon id="app-terminal-face" points="134,113 196,78 196,146 134,181" fill="#111418"></polygon>
      <g id="app-prompt" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
